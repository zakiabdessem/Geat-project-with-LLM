services:
  # ─── Frontend — Next.js ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: geat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_OLLAMA_URL=http://ollama:11434
    depends_on:
      - backend
      - ollama
    networks:
      - geat-network

  # ─── Backend — FastAPI ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: geat-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://geat_user:geat_pass@postgres:5432/geat_db
      - JWT_SECRET=change_this_in_production
      - JWT_EXPIRE_MINUTES=60
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=5
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - geat-network

  # ─── Database — PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geat-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=geat_db
      - POSTGRES_USER=geat_user
      - POSTGRES_PASSWORD=geat_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geat_user -d geat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geat-network

  # ─── AI Runtime — Ollama (LLaMA 3) ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: geat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - geat-network

  # ─── Model Puller — runs once then exits ─────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: geat-ollama-init
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
        echo 'Pulling llama3 model...' &&
        ollama pull llama3 &&
        echo 'Model ready.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - geat-network

  # ─── Reverse Proxy — Nginx ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: geat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - geat-network

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres_data:
  ollama_data:
  uploads_data:

# ─── Networks ─────────────────────────────────────────────────────
networks:
  geat-network:
    driver: bridge